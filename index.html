<!DOCTYPE html>
<html>
<head>
<style>

body{
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
}

.wrap{
  background:white;
  padding:40px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
   animation: slideIn 0.6s ease-out;
}

h2{
  margin-bottom:25px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:15px;
  box-sizing: border-box;
}

input:focus{
  outline:none;
  border:1px solid #667eea;
  box-shadow:0 0 5px rgba(102,126,234,0.5);
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#5a67d8;
  transform:scale(1.02);
}

@keyframes slideIn{
  from{
    opacity:0;
    transform: translateY(20px) scale(0.98);
  }
  to{
    opacity:1;
    transform: translateY(0) scale(1);
  }
}

</style>
</head>

<body>

<div class="wrap">

<h2>상품 입력</h2>

<input id="name" placeholder="상품명">
<input id="price" type="number" placeholder="가격">

<button onclick="save()">다음</button>

</div>

<script>
function save(){

let name = document.getElementById("name").value.trim();
let price = document.getElementById("price").value.trim();

if(name == ""){
 alert("상품명 입력");
 return;
}

if(price == ""){
 alert("가격 입력");
 return;
}

old = localStorage.getItem("list");
add = "상품명 : " + document.getElementById("name").value
    + "<br>가격 : " + document.getElementById("price").value + " 원<hr>";

if(old == null){
  localStorage.setItem("list", add);
}else{
  localStorage.setItem("list", old + add);
}
location.href="result.html";

}
</script>

</body>

</html>
