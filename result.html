<!DOCTYPE html>
<html>
<head>
<style>

*{
  box-sizing:border-box;
}

body{
  font-family: Arial;
  background: linear-gradient(135deg,#667eea,#764ba2);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
}

.wrap{
  background:white;
  padding:40px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);

  animation: slideIn 0.6s ease-out;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform: translateY(20px) scale(0.98);
  }
  to{
    opacity:1;
    transform: translateY(0) scale(1);
  }
}

h2{
  margin-bottom:20px;
}

.result-box{
  background:#f7f7f7;
  padding:18px;
  border-radius:10px;
  margin-bottom:20px;
  text-align:left;
  min-height:60px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

button:hover{
  background:#5a67d8;
  transform:scale(1.02);
}

</style>
</head>

<body>

<div class="wrap">

<h2>입력 결과</h2>

<div class="result-box" id="result"></div>

<button onclick="back()">다시 입력</button>
<button onclick="clearAll()">전체 삭제</button>
<button >전체 주문</button>

</div>

<script>

let data = localStorage.getItem("list");

if(data == null){
  document.getElementById("result").innerHTML = "저장된 상품이 없습니다.";
}else{
  document.getElementById("result").innerHTML = data;
}

function back(){
  location.href="index.html";
}

function clearAll(){
  localStorage.removeItem("list");
  location.reload();
}


</script>

</body>

</html>
